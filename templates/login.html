<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Whereby Recordings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c1a26;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #112233;
      border: 1px solid #1e3a52;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: #38bdf8; margin-bottom: 4px; }
    .logo span { color: #e2e8f0; }

    .subtitle { font-size: 0.85rem; color: #6b8fa8; margin-bottom: 32px; }

    label { display: block; font-size: 0.82rem; color: #94afc4; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 10px 14px;
      background: #0d2035;
      border: 1px solid #1e3a52;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #38bdf8; }

    .password-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .password-wrap input {
      margin-bottom: 0;
      padding-right: 42px;
      width: 100%;
    }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: #6b8fa8;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #38bdf8; }

    .error {
      background: #2a1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #fca5a5;
      margin-bottom: 18px;
    }

    .submit-btn {
      width: 100%;
      padding: 11px;
      background: #38bdf8;
      color: #0c1a26;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .submit-btn:hover { background: #0ea5e9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Whereby <span>Recordings</span></div>
    <div class="subtitle">Sign in to access recordings</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required />

      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" name="password" autocomplete="current-password" required />
        <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <button type="submit" class="submit-btn">Sign In</button>
    </form>
  </div>

  <script>
    const btn = document.getElementById('eyeBtn');
    const input = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');

    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    btn.addEventListener('click', () => {
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      icon.innerHTML = isPassword ? eyeClosed : eyeOpen;
    });
  </script>
</body>
</html>
